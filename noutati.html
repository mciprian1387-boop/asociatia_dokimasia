<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noutăți — Asociația Dokimasia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #fff; color: #222; }
    a { text-decoration: none; color: inherit; }

    /* HEADER */
    header { border-bottom: 1px solid #e0e0e0; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
    .header-top { display: grid; grid-template-columns: auto 1fr auto; align-items: center; padding: 12px 40px; gap: 16px; }
    .header-logo img { height: 80px; width: auto; display: block; }
    .header-center { text-align: center; }
    .header-title { display: block; font-size: clamp(1rem, 3vw, 2rem); font-weight: bold; color: #8B0000; text-transform: uppercase; letter-spacing: 3px; white-space: nowrap; }
    .header-motto { display: block; font-size: clamp(0.65rem, 1.5vw, 0.95rem); color: #8B0000; font-weight: normal; letter-spacing: 2px; margin-top: 4px; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 12px; justify-content: flex-end; }
    .social-icons { display: flex; align-items: center; gap: 10px; }
    .social-icons a { display: flex; align-items: center; transition: opacity 0.2s; cursor: pointer; }
    .social-icons a:hover { opacity: 0.7; }
    .social-icons svg { width: 26px; height: 26px; }
    .btn-account { display: flex; align-items: center; gap: 6px; background: #8B0000; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-family: 'Georgia', serif; cursor: pointer; border: none; transition: background 0.2s; white-space: nowrap; }
    .btn-account:hover { background: #6a0000; }
    .account-wrapper { position: relative; }
    .account-dropdown { display: none; position: absolute; top: 110%; right: 0; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 180px; z-index: 200; padding: 8px 0; }
    .account-dropdown.open { display: block; }
    .account-dropdown a { display: block; padding: 10px 20px; font-size: 0.9rem; color: #333; transition: background 0.15s; }
    .account-dropdown a:hover { background: #f5f5f5; color: #8B0000; }

    /* NAVBAR */
    nav.main-nav { background: #8B0000; display: flex; width: 100%; }
    nav.main-nav a { flex: 1; color: #fff; font-size: 0.95rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-align: center; padding: 13px 0; transition: background 0.2s; border-right: 1px solid rgba(255,255,255,0.4); }
    nav.main-nav a:last-child { border-right: none; }
    nav.main-nav a:hover, nav.main-nav a.active { background: rgba(255,255,255,0.15); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .hamburger span { display: block; width: 26px; height: 3px; background: #8B0000; border-radius: 2px; }

    /* PAGE HERO */
    .page-hero { background: linear-gradient(135deg, #8B0000 0%, #6a0000 100%); color: #fff; text-align: center; padding: 16px 20px; }
    .page-hero h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 6px; letter-spacing: 2px; }
    .page-hero p { font-size: 1rem; opacity: 0.9; }

    /* CONTENT */
    .content-wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

    /* FILTERS */
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
    .filter-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #8B0000; background: #fff; color: #8B0000; font-family: 'Georgia', serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: #8B0000; color: #fff; }

    /* ARTICLE CARDS */
    .articles-list { display: flex; flex-direction: column; gap: 16px; }
    .article-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: box-shadow 0.2s; }
    .article-card:hover { box-shadow: 0 4px 16px rgba(139,0,0,0.1); }
    .article-header { padding: 20px 24px; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .article-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .article-title { font-size: 1.05rem; font-weight: bold; color: #222; line-height: 1.4; }
    .article-date { font-size: 0.78rem; color: #999; }
    .article-arrow { font-size: 1.2rem; color: #8B0000; flex-shrink: 0; transition: transform 0.2s; }
    .article-card.open .article-arrow { transform: rotate(180deg); }
    .article-body { display: none; padding: 0 24px 24px; border-top: 1px solid #f0e0e0; }
    .article-card.open .article-body { display: block; }
    .article-text { font-size: 0.95rem; line-height: 1.9; color: #444; padding-top: 16px; white-space: pre-line; }

    /* BADGE */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.72rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .badge-noutati { background: #e8f4fd; color: #1565c0; }
    .badge-proiecte { background: #e8f5e9; color: #2e7d32; }
    .badge-evenimente { background: #fff3e0; color: #e65100; }
    .badge-publicatii { background: #f3e5f5; color: #6a1b9a; }
    .badge-default { background: #f0f0f0; color: #666; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1rem; }

    /* LOADING */
    .loading { text-align: center; padding: 40px; color: #888; }

    /* FOOTER */
    footer { background: #8B0000; color: #fff; text-align: center; padding: 30px 20px; font-size: 0.85rem; margin-top: 40px; }
    footer a { color: #f5c0c0; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; margin: 20px; position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .modal h2 { color: #8B0000; font-size: 1.5rem; margin-bottom: 24px; text-align: center; }
    .modal-close { position: absolute; top: 16px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #999; background: none; border: none; }
    .modal-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #e0e0e0; }
    .modal-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 0.95rem; color: #999; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .modal-tab.active { color: #8B0000; border-bottom-color: #8B0000; font-weight: bold; }
    .modal-msg { text-align: center; font-size: 0.85rem; margin-top: 12px; min-height: 20px; color: #8B0000; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; font-family: 'Georgia', serif; outline: none; }
    .form-group input:focus { border-color: #8B0000; }
    .btn-primary { background: #8B0000; color: #fff; padding: 12px 30px; border-radius: 6px; font-size: 1rem; font-family: 'Georgia', serif; border: none; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn-primary:hover { background: #6a0000; }

    /* MOBILE */
    .mobile-header { display: none; }
    @media (max-width: 768px) {
      .header-top { display: none; }
      nav.main-nav { display: none !important; }
      .mobile-header { display: block; background: #fff; border-bottom: 1px solid #e0e0e0; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
      .mob-row1 { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
      .mob-logo img { height: 50px; }
      .mob-row2 { text-align: center; padding: 6px 16px 2px; }
      .mob-title { display: block; font-size: 1.05rem; font-weight: bold; color: #8B0000; text-transform: uppercase; letter-spacing: 2px; }
      .mob-motto { display: block; font-size: 0.68rem; color: #8B0000; letter-spacing: 1px; margin-top: 2px; }
      .mob-row4 { display: flex; justify-content: center; padding: 6px 16px 10px; border-top: 1px solid #f0e0e0; }
      .mob-hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 6px; }
      .mob-hamburger span { display: block; width: 28px; height: 3px; background: #8B0000; border-radius: 2px; }
      .mob-nav { display: none; flex-direction: column; background: #8B0000; }
      .mob-nav.open { display: flex; }
      .mob-nav a { color: #fff; text-align: center; padding: 14px; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2); }
      .content-wrap { padding: 24px 16px; }
      .article-header { padding: 16px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="header.js"></script>
</head>
<body>

<!-- HERO -->
<div class="page-hero">
  <h1>Noutăți</h1>
  <p>Ultimele articole și informații de la Asociația Dokimasia</p>
</div>

<!-- CONTENT -->
<div class="content-wrap">

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterArticles('all', this)">Toate</button>
    <button class="filter-btn" onclick="filterArticles('noutati', this)">Noutăți</button>
    <button class="filter-btn" onclick="filterArticles('proiecte', this)">Proiecte</button>
    <button class="filter-btn" onclick="filterArticles('evenimente', this)">Evenimente</button>
    <button class="filter-btn" onclick="filterArticles('publicatii', this)">Publicații</button>
  </div>

  <!-- ARTICLES -->
  <div class="articles-list" id="articlesList">
    <div class="loading">Se încarcă articolele...</div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© <span id="year"></span> Asociația Dokimasia. Toate drepturile rezervate.</p>
  <p style="margin-top:8px"><a href="contact.html">contact@dokimasia.ro</a></p>
</footer>


</body>
</html>
