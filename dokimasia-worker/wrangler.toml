name = "dokimasia-articole"
main = "worker.js"
compatibility_date = "2024-01-01"

# R2 Bucket binding
# Înlocuiește "articole-dokimasia" cu numele exact al bucket-ului tău R2
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "site-asociatie"

# Variabilele secrete se adaugă din linia de comandă (nu le pune aici!):
# wrangler secret put RESEND_API_KEY
# wrangler secret put EMAIL_TO
# wrangler secret put EMAIL_FROM
