<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copertă Revista Dokimasia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#e8e4dc; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Source Serif 4', Georgia, serif; }

    .coperta {
      width:420px;
      height:594px; /* A4 proporție */
      background:#8B0000;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:36px 32px 32px;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    /* Bordură aurie interioară */
    .coperta::before {
      content:'';
      position:absolute;
      inset:14px;
      border:0.8px solid rgba(184,150,62,0.45);
      pointer-events:none;
    }

    /* Zona superioară */
    .zona-sus {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      width:100%;
    }

    .logo {
      height:90px;
      width:auto;
      filter: brightness(0) invert(1);
      opacity:0.92;
    }

    .linie-aur {
      width:200px;
      height:1px;
      background:linear-gradient(to right, transparent, #b8963e, transparent);
    }

    .linie-aur.scurta { width:100px; }

    .asociatia {
      font-family:'Source Serif 4', sans-serif;
      font-size:9px;
      letter-spacing:4px;
      color:rgba(255,255,255,0.7);
      text-transform:uppercase;
    }

    /* Titlu principal */
    .zona-titlu {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
      width:100%;
    }

    .titlu-revista {
      font-family:'Playfair Display', serif;
      font-size:42px;
      font-weight:900;
      color:#ffffff;
      letter-spacing:4px;
      text-transform:uppercase;
      line-height:1.1;
      text-align:center;
    }

    .titlu-revista span {
      display:block;
    }

    .linie-aur-dubla {
      margin:14px 0 12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }
    .linie-aur-dubla .l1 { width:220px; height:1.5px; background:#b8963e; }
    .linie-aur-dubla .l2 { width:160px; height:0.5px; background:rgba(184,150,62,0.5); }

    .motto {
      font-family:'Playfair Display', serif;
      font-size:14px;
      font-style:italic;
      color:rgba(255,255,255,0.88);
      letter-spacing:0.5px;
      text-align:center;
    }

    /* Zona inferioară */
    .zona-jos {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      width:100%;
    }

    .separator {
      width:100%;
      height:0.4px;
      background:rgba(255,255,255,0.18);
    }

    .numar {
      font-family:'Source Serif 4', sans-serif;
      font-size:10px;
      letter-spacing:4px;
      color:rgba(255,255,255,0.65);
      text-transform:uppercase;
    }

    .issn {
      font-family:'Source Serif 4', sans-serif;
      font-size:9px;
      letter-spacing:3px;
      color:#b8963e;
    }

    .ornament {
      font-family:'Playfair Display', serif;
      font-size:12px;
      color:rgba(255,255,255,0.18);
      letter-spacing:6px;
    }

    /* Buton print */
    .print-btn {
      position:fixed;
      bottom:24px;
      right:24px;
      background:#8B0000;
      color:#fff;
      border:none;
      padding:10px 20px;
      font-family:'Source Serif 4', serif;
      font-size:13px;
      cursor:pointer;
      border-radius:4px;
      box-shadow:0 4px 14px rgba(0,0,0,0.2);
    }
    .print-btn:hover { background:#5a0000; }

    @media print {
      body { background:white; }
      .print-btn { display:none; }
      .coperta { box-shadow:none; }
    }
  </style>
</head>
<body>

<div class="coperta">

  <div class="zona-sus">
    <img src="Logo.gif" alt="Logo Asociația Dokimasia" class="logo"/>
    <div class="linie-aur"></div>
    <div class="asociatia">Asociația Dokimasia</div>
  </div>

  <div class="zona-titlu">
    <div class="titlu-revista">
      <span>Revista</span>
      <span>Dokimasia</span>
    </div>
    <div class="linie-aur-dubla">
      <div class="l1"></div>
      <div class="l2"></div>
    </div>
    <div class="motto">Învățare. Implicare. Progres.</div>
  </div>

  <div class="zona-jos">
    <div class="separator"></div>
    <div class="numar">Nr. 1 &nbsp;·&nbsp; Februarie 2025</div>
    <div class="linie-aur scurta"></div>
    <div class="issn">ISSN 0000-0000</div>
    <div class="ornament">— ✦ —</div>
  </div>

</div>

<button class="print-btn" onclick="window.print()">Printează / Salvează PDF</button>

</body>
</html>
